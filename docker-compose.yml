version: '3.8'

services:
  db:
    image: postgres:17
    container_name: virtual-banking-db
    restart: always
    environment:
      POSTGRES_DB: virtual_banking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
